<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Web-Game by Dilsan Basnet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon -typing.jpg" type="image/x-icon ">
</head>

<body class="body-style">

    <div id="game-container">
        <div id="top-bar">
            <div class="left-group">
                <img src="2309.png" alt="Dilsan Profile Pic" class="profile-pic">
                <div class="game-name">Cyber - Typer</div>
            </div>

            <div class="start-group">
                <div class="start-item">
                    <span class="stat-label tab-enter-restart">WPM</span>
                    <span id="wpm-val" class="stat-value">0</span>
                </div>

                <div class="stat-item">
                    <span class="stat-label tab-enter-restart">accuracy</span>
                    <span id="acc-val" class="stat-value ">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label tab-enter-restart">time</span>
                    <span id="timer-val" class="stat-value ">30</span>
                </div>
            </div>
        </div>

        <div id="typing-window">
            <div id="caret"></div>
            <div id="words-wrapper"></div>
        </div>

        <div class="footer-hint">
            <span class="tab-enter-restart">tab</span> + <span class="tab-enter-restart">enter</span> + <span
                class="tab-enter-restart">to restart protocol</span>
        </div>

        <input type="text" id="hidden-input" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>

    <div id="subfooter">
        <div class="history-title">Test History</div>
        <div id="history-list">No data yet - complete a test to see results</div>
    </div>


</body>

</html>
